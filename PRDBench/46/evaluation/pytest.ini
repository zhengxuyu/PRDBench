[tool:pytest]
# Disable output capture to avoid buffer detached issue
addopts = --capture=no --tb=short -v
# Set test naming conventions
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Disable warnings
filterwarnings = ignore::DeprecationWarning
# Configure logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S